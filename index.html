<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ייעוץ משכנתאות אישי | לירון</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep-ocean:   #1C3A4A;
      --warm-gold:    #C8A96E;
      --deep-gold:    #A07840;
      --warm-cream:   #F5F1EB;
      --warm-sand:    #E8DDD0;
      --forest-trust: #2E5D4B;
      --medium-blue:  #3A6B7A;
      --terracotta:   #B8624C;
      --text-dark:    #1C2B35;
      --text-body:    #3D4F5A;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Heebo', sans-serif;
      font-size: 16px; line-height: 1.7;
      color: var(--text-body);
      background: var(--warm-cream);
      direction: rtl;
    }
    h1, h2, h3, h4 {
      font-family: 'Fraunces', 'Frank Ruhl Libre', serif;
      color: var(--deep-ocean); line-height: 1.2;
    }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }

    /* ── page-load skeleton ── */
    body.loading > *:not(#loadingOverlay) { visibility: hidden; }
    #loadingOverlay {
      position: fixed; inset: 0; background: var(--warm-cream);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; font-family: 'Heebo', sans-serif;
      font-size: 16px; color: var(--warm-gold);
    }
    body.ready #loadingOverlay { display: none; }
    body.ready > *:not(#loadingOverlay) { visibility: visible; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; border-radius: 4px;
      font-family: 'Heebo', sans-serif; font-weight: 600; font-size: 16px;
      cursor: pointer; border: none;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .btn-gold { background: var(--warm-gold); color: var(--deep-ocean); }
    .btn-gold:hover { background: var(--deep-gold); color: #fff; }
    .btn-whatsapp { background: #25D366; color: #fff; }
    .btn-outline-cream { background: transparent; border: 2px solid var(--warm-cream); color: var(--warm-cream); }
    .btn-outline-cream:hover { background: var(--warm-cream); color: var(--deep-ocean); }

    /* ── FADE IN ── */
    .fade-in { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
    .fade-in.visible { opacity: 1; transform: none; }

    /* ══ NAV ══ */
    #navbar {
      position: fixed; top: 0; right: 0; left: 0; z-index: 1000;
      background: var(--warm-cream); border-bottom: 1px solid rgba(28,58,74,.1);
      height: 68px; display: flex; align-items: center;
    }
    .nav-inner {
      width: 100%; max-width: 1140px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-family: 'Fraunces','Frank Ruhl Libre',serif; font-size: 20px; font-weight: 500; color: var(--deep-ocean); }
    .nav-logo span { color: var(--warm-gold); font-style: italic; }
    .nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
    .nav-links a { font-size: 15px; font-weight: 500; color: var(--text-body); transition: color .2s; }
    .nav-links a:hover { color: var(--warm-gold); }
    .nav-cta { margin-right: 16px; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
    .hamburger span { width: 26px; height: 2px; background: var(--deep-ocean); border-radius: 2px; transition: transform .3s, opacity .3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu {
      display: none; position: fixed; top: 68px; right: 0; left: 0;
      background: var(--warm-cream); border-bottom: 1px solid rgba(28,58,74,.12);
      z-index: 999; padding: 24px; flex-direction: column; gap: 20px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-size: 17px; font-weight: 500; color: var(--text-body); padding: 6px 0; border-bottom: 1px solid rgba(28,58,74,.08); }
    .mobile-menu .btn { width: 100%; justify-content: center; margin-top: 8px; }

    /* ══ HERO ══ */
    #hero {
      padding-top: 68px; min-height: 100vh; background: var(--warm-cream);
      display: flex; align-items: center; overflow: hidden; position: relative;
    }
    .hero-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; padding: 100px 24px 80px; max-width: 1140px; margin: 0 auto; width: 100%; }
    .hero-tag { display: inline-flex; align-items: center; gap: 8px; background: rgba(200,169,110,.15); border: 1px solid rgba(200,169,110,.4); border-radius: 100px; padding: 6px 16px; font-size: 13px; font-weight: 600; color: var(--deep-gold); margin-bottom: 28px; }
    .hero-tag::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--warm-gold); }
    .hero-h1 { font-size: clamp(40px,5.5vw,68px); font-weight: 400; color: var(--deep-ocean); margin-bottom: 8px; line-height: 1.1; }
    .hero-h1 em { font-style: italic; color: var(--warm-gold); }
    .hero-sub { font-size: 18px; color: var(--text-body); max-width: 460px; margin-bottom: 36px; line-height: 1.65; }
    .hero-cta-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .hero-trust { font-size: 13px; color: #7A8F99; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .hero-trust .dot { color: var(--warm-gold); }
    .hero-visual { position: relative; display: flex; justify-content: center; align-items: center; }
    .hero-svg-wrap { position: relative; width: 440px; height: 440px; }
    .hero-svg-wrap svg { width: 100%; height: 100%; }
    .data-chip { position: absolute; background: #fff; border-radius: 12px; padding: 12px 18px; box-shadow: 0 8px 32px rgba(28,58,74,.12); display: flex; flex-direction: column; font-size: 12px; font-weight: 600; color: var(--deep-ocean); min-width: 120px; }
    .data-chip .chip-num { font-family: 'Fraunces',serif; font-size: 24px; color: var(--warm-gold); }
    .chip-1 { top: 30px; left: -10px; }
    .chip-2 { bottom: 60px; right: -10px; }
    .chip-3 { top: 160px; right: -30px; }

    /* ══ PAIN/SOLUTION ══ */
    #pain-solution { padding: 100px 0; background: #fff; }
    .section-label { font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--warm-gold); margin-bottom: 12px; }
    .section-title { font-size: clamp(28px,3.5vw,42px); font-weight: 400; color: var(--deep-ocean); margin-bottom: 48px; }
    .pain-solution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
    .pain-side, .solution-side { display: flex; flex-direction: column; gap: 24px; }
    .pain-item, .solution-item { display: flex; gap: 16px; align-items: flex-start; }
    .pain-marker { width: 10px; height: 10px; border-radius: 50%; background: var(--terracotta); flex-shrink: 0; margin-top: 8px; }
    .solution-marker { width: 10px; height: 10px; border-radius: 50%; background: var(--forest-trust); flex-shrink: 0; margin-top: 8px; }
    .pain-item h4 { font-family: 'Heebo',sans-serif; font-size: 17px; font-weight: 600; color: var(--terracotta); margin-bottom: 4px; }
    .solution-item h4 { font-family: 'Heebo',sans-serif; font-size: 17px; font-weight: 600; color: var(--forest-trust); margin-bottom: 4px; }
    .pain-item p, .solution-item p { font-size: 15px; color: var(--text-body); }
    .divider-arrow { display: none; justify-content: center; align-items: center; font-size: 32px; color: var(--warm-gold); }

    /* ══ PROCESS ══ */
    #process { padding: 100px 0; background: var(--deep-ocean); }
    #process .section-label { color: var(--warm-gold); }
    #process .section-title { color: var(--warm-cream); }
    .timeline { display: flex; gap: 0; position: relative; margin-top: 16px; }
    .timeline::before { content: ''; position: absolute; top: 32px; right: 8%; left: 8%; height: 2px; background: linear-gradient(to left,var(--warm-gold),rgba(200,169,110,.3)); }
    .timeline-step { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 12px; position: relative; }
    .step-num { width: 64px; height: 64px; border-radius: 50%; background: rgba(200,169,110,.15); border: 2px solid var(--warm-gold); display: flex; align-items: center; justify-content: center; font-family: 'Fraunces',serif; font-size: 22px; color: var(--warm-gold); margin-bottom: 20px; position: relative; z-index: 1; transition: background .3s; }
    .timeline-step:hover .step-num { background: var(--warm-gold); color: var(--deep-ocean); }
    .step-title { font-family: 'Heebo',sans-serif; font-size: 15px; font-weight: 700; color: var(--warm-cream); margin-bottom: 8px; }
    .step-desc { font-size: 13px; color: rgba(245,241,235,.65); line-height: 1.5; }

    /* ══ SPECIALTIES ══ */
    #specialties { padding: 100px 0; background: var(--warm-sand); }
    .cards-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 24px; margin-top: 16px; }
    .spec-card { background: var(--warm-cream); border-radius: 12px; padding: 32px 24px; border: 1px solid rgba(28,58,74,.07); transition: transform .3s, box-shadow .3s; }
    .spec-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(28,58,74,.12); }
    .spec-icon { width: 52px; height: 52px; border-radius: 12px; background: rgba(28,58,74,.08); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 24px; }
    .spec-card h3 { font-size: 18px; font-weight: 500; margin-bottom: 10px; color: var(--deep-ocean); }
    .spec-card p { font-size: 14px; color: var(--text-body); line-height: 1.6; }

    /* ══ ABOUT ══ */
    #about { padding: 100px 0; background: #fff; }
    .about-grid { display: grid; grid-template-columns: 340px 1fr; gap: 72px; align-items: center; }
    .about-avatar-wrap { display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .avatar-circle { width: 220px; height: 220px; border-radius: 50%; background: linear-gradient(135deg,var(--warm-sand),var(--warm-gold)); display: flex; align-items: center; justify-content: center; font-family: 'Fraunces',serif; font-size: 52px; color: var(--deep-ocean); font-weight: 300; position: relative; overflow: hidden; }
    .avatar-circle::after { content: ''; position: absolute; inset: 6px; border-radius: 50%; border: 2px solid rgba(255,255,255,.5); }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .about-name { font-size: 22px; font-weight: 500; color: var(--deep-ocean); text-align: center; }
    .about-title-sub { font-size: 14px; color: var(--warm-gold); font-weight: 600; text-align: center; letter-spacing: .03em; }
    .credentials { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
    .credentials li { display: flex; align-items: flex-start; gap: 10px; font-size: 15px; color: var(--text-body); }
    .cred-check { width: 20px; height: 20px; border-radius: 50%; background: rgba(46,93,75,.12); color: var(--forest-trust); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; margin-top: 2px; }
    .about-text { font-size: 16px; line-height: 1.75; color: var(--text-body); border-right: 3px solid var(--warm-gold); padding-right: 20px; }

    /* ══ TESTIMONIALS ══ */
    #testimonials { padding: 100px 0; background: var(--forest-trust); }
    #testimonials .section-label { color: var(--warm-gold); }
    #testimonials .section-title { color: var(--warm-cream); }
    .testimonials-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-top: 16px; }
    .testi-card { background: rgba(255,255,255,.08); border: 1px solid rgba(245,241,235,.15); border-radius: 12px; padding: 36px 28px; display: flex; flex-direction: column; gap: 20px; transition: background .3s; }
    .testi-card:hover { background: rgba(255,255,255,.13); }
    .quote-mark { font-family: 'Fraunces',serif; font-size: 56px; line-height: .8; color: var(--warm-gold); opacity: .5; }
    .testi-text { font-size: 15px; line-height: 1.7; color: rgba(245,241,235,.9); flex: 1; }
    .testi-meta { display: flex; flex-direction: column; gap: 4px; }
    .testi-name { font-weight: 700; font-size: 15px; color: var(--warm-cream); }
    .testi-case { font-size: 13px; color: var(--warm-gold); }

    /* ══ CTA BOTTOM ══ */
    #cta-bottom { padding: 100px 0; background: var(--deep-ocean); position: relative; overflow: hidden; }
    #cta-bottom::before { content: ''; position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle,rgba(200,169,110,.08) 0%,transparent 70%); pointer-events: none; }
    .cta-inner { text-align: center; max-width: 700px; margin: 0 auto; }
    .cta-title { font-size: clamp(32px,4vw,52px); font-weight: 400; color: var(--warm-gold); margin-bottom: 16px; }
    .cta-title em { font-style: italic; }
    .cta-subtitle { font-size: 18px; color: rgba(245,241,235,.75); margin-bottom: 48px; }
    .cta-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 48px; }
    .cta-form { background: rgba(255,255,255,.06); border: 1px solid rgba(200,169,110,.25); border-radius: 16px; padding: 40px; max-width: 540px; margin: 0 auto; }
    .form-title { font-family: 'Heebo',sans-serif; font-size: 18px; font-weight: 600; color: var(--warm-cream); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: rgba(245,241,235,.7); margin-bottom: 6px; }
    .form-group input, .form-group textarea { width: 100%; background: rgba(255,255,255,.07); border: 1px solid rgba(200,169,110,.25); border-radius: 8px; padding: 12px 16px; color: var(--warm-cream); font-family: 'Heebo',sans-serif; font-size: 15px; transition: border-color .2s; direction: rtl; }
    .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(245,241,235,.35); }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--warm-gold); }
    .form-group textarea { height: 100px; resize: vertical; }
    .form-submit { width: 100%; margin-top: 8px; justify-content: center; }
    .form-promise { font-size: 13px; color: rgba(245,241,235,.5); text-align: center; margin-top: 16px; }

    /* ══ FOOTER ══ */
    footer { background: #0f2230; padding: 32px 0; text-align: center; }
    footer p { font-size: 13px; color: rgba(245,241,235,.4); }
    footer span { color: var(--warm-gold); }

    /* ══ FLOATING WA ══ */
    .whatsapp-float { position: fixed; bottom: 28px; left: 28px; z-index: 900; width: 58px; height: 58px; border-radius: 50%; background: #25D366; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 24px rgba(37,211,102,.35); transition: transform .25s, box-shadow .25s; }
    .whatsapp-float:hover { transform: scale(1.1); box-shadow: 0 10px 32px rgba(37,211,102,.45); }
    .whatsapp-float svg { width: 30px; height: 30px; fill: #fff; }
    .whatsapp-pulse { position: absolute; inset: -6px; border-radius: 50%; border: 2px solid rgba(37,211,102,.4); animation: pulse 2.2s ease-out infinite; }
    @keyframes pulse { 0%{transform:scale(1);opacity:.7;} 100%{transform:scale(1.5);opacity:0;} }

    /* ══ RESPONSIVE ══ */
    @media(max-width:1024px){
      .cards-grid{grid-template-columns:repeat(2,1fr);}
      .about-grid{grid-template-columns:1fr;gap:48px;}
      .about-avatar-wrap{flex-direction:row;align-items:flex-start;}
    }
    @media(max-width:768px){
      .nav-links,.nav-cta{display:none;}
      .hamburger{display:flex;}
      .hero-inner{grid-template-columns:1fr;gap:48px;padding:72px 24px 60px;}
      .hero-visual{display:none;}
      .pain-solution-grid{grid-template-columns:1fr;}
      .divider-arrow{display:flex;}
      .timeline{flex-direction:column;gap:32px;}
      .timeline::before{display:none;}
      .timeline-step{flex-direction:row;text-align:right;gap:20px;align-items:flex-start;}
      .step-num{flex-shrink:0;}
      .cards-grid{grid-template-columns:1fr;}
      .testimonials-grid{grid-template-columns:1fr;}
      .about-avatar-wrap{flex-direction:column;align-items:center;}
      .cta-form{padding:28px 20px;}
    }
    @media(max-width:480px){
      .hero-h1{font-size:34px;}
      .hero-cta-row{flex-direction:column;align-items:flex-start;}
    }
  </style>
</head>
<body class="loading">
<div id="loadingOverlay">טוען...</div>

<!-- NAV -->
<nav id="navbar">
  <div class="nav-inner">
    <div class="nav-logo" id="navLogo">ייעוץ <span>משכנתאות</span></div>
    <ul class="nav-links" id="navLinks"></ul>
    <a href="#cta-bottom" class="btn btn-gold nav-cta" id="navCta" style="padding:10px 24px;font-size:14px;"></a>
    <button class="hamburger" id="hamburger" aria-label="תפריט">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu"></div>

<!-- HERO -->
<section id="hero">
  <div class="hero-inner">
    <div class="hero-text fade-in">
      <div class="hero-tag" id="heroTag"></div>
      <h1 class="hero-h1" id="heroTitle"></h1>
      <p class="hero-sub" id="heroSub"></p>
      <div class="hero-cta-row">
        <a href="#cta-bottom" class="btn btn-gold" id="heroCta"></a>
      </div>
      <p class="hero-trust" id="heroTrust" style="margin-top:20px;"></p>
    </div>
    <div class="hero-visual fade-in" style="transition-delay:.2s;">
      <div class="hero-svg-wrap">
        <svg viewBox="0 0 440 440" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="220" cy="220" r="200" fill="rgba(200,169,110,.06)" />
          <circle cx="220" cy="220" r="160" stroke="rgba(200,169,110,.15)" stroke-width="1.5" stroke-dasharray="8 6"/>
          <circle cx="220" cy="220" r="120" stroke="rgba(28,58,74,.1)" stroke-width="1" />
          <circle cx="220" cy="220" r="80" stroke="#C8A96E" stroke-width="3" fill="rgba(200,169,110,.06)"/>
          <path d="M220 160 L270 200 V260 H170 V200 Z" fill="rgba(28,58,74,.12)" stroke="var(--deep-ocean)" stroke-width="2" stroke-linejoin="round"/>
          <path d="M200 260 V230 H240 V260" fill="rgba(200,169,110,.3)" stroke="var(--deep-ocean)" stroke-width="1.5"/>
          <path d="M175 205 Q220 155 265 205" stroke="#C8A96E" stroke-width="2.5" fill="none"/>
          <circle cx="110" cy="110" r="4" fill="rgba(200,169,110,.4)"/>
          <circle cx="330" cy="110" r="4" fill="rgba(200,169,110,.4)"/>
          <circle cx="110" cy="330" r="4" fill="rgba(200,169,110,.4)"/>
          <circle cx="330" cy="330" r="4" fill="rgba(200,169,110,.4)"/>
          <circle cx="220" cy="80"  r="6" fill="#C8A96E" opacity=".6"/>
          <circle cx="360" cy="220" r="6" fill="#C8A96E" opacity=".4"/>
          <circle cx="80"  cy="220" r="6" fill="#C8A96E" opacity=".4"/>
          <line x1="220" y1="86" x2="220" y2="154" stroke="rgba(200,169,110,.3)" stroke-width="1" stroke-dasharray="4 4"/>
          <line x1="354" y1="220" x2="302" y2="220" stroke="rgba(200,169,110,.3)" stroke-width="1" stroke-dasharray="4 4"/>
          <circle cx="155" cy="145" r="8" fill="rgba(46,93,75,.2)" stroke="var(--forest-trust)" stroke-width="1.5"/>
          <circle cx="285" cy="145" r="8" fill="rgba(46,93,75,.2)" stroke="var(--forest-trust)" stroke-width="1.5"/>
          <text x="214" y="230" font-family="serif" font-size="28" fill="rgba(200,169,110,.25)" text-anchor="middle">%</text>
        </svg>
        <div id="heroChips"></div>
      </div>
    </div>
  </div>
</section>

<!-- PAIN/SOLUTION -->
<section id="pain-solution">
  <div class="container">
    <div class="section-label" id="psLabel"></div>
    <h2 class="section-title fade-in" id="psTitle"></h2>
    <div class="pain-solution-grid">
      <div class="pain-side" id="painsList"></div>
      <div class="divider-arrow">→</div>
      <div class="solution-side" id="solutionsList"></div>
    </div>
  </div>
</section>

<!-- PROCESS -->
<section id="process">
  <div class="container">
    <div class="section-label" id="procLabel"></div>
    <h2 class="section-title fade-in" id="procTitle"></h2>
    <div class="timeline" id="timeline"></div>
  </div>
</section>

<!-- SPECIALTIES -->
<section id="specialties">
  <div class="container">
    <div class="section-label" id="specLabel"></div>
    <h2 class="section-title fade-in" id="specTitle"></h2>
    <div class="cards-grid" id="specCards"></div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="container">
    <div class="about-grid">
      <div class="about-avatar-wrap fade-in">
        <div>
          <div class="avatar-circle" id="avatarCircle"></div>
        </div>
        <div style="text-align:center;">
          <div class="about-name" id="aboutName"></div>
          <div class="about-title-sub" id="aboutSubtitle" style="margin-bottom:20px;"></div>
          <ul class="credentials" id="credList"></ul>
        </div>
      </div>
      <div class="fade-in" style="transition-delay:.15s;">
        <div class="section-label" id="aboutLabel"></div>
        <h2 class="section-title" id="aboutTitle" style="margin-bottom:28px;"></h2>
        <p class="about-text" id="aboutText"></p>
      </div>
    </div>
  </div>
</section>

<!-- TESTIMONIALS -->
<section id="testimonials">
  <div class="container">
    <div class="section-label" id="testiLabel"></div>
    <h2 class="section-title fade-in" id="testiTitle"></h2>
    <div class="testimonials-grid" id="testiGrid"></div>
  </div>
</section>

<!-- CTA BOTTOM -->
<section id="cta-bottom">
  <div class="container">
    <div class="cta-inner">
      <div class="section-label" id="ctaLabel" style="text-align:center;"></div>
      <h2 class="cta-title fade-in" id="ctaTitle"></h2>
      <p class="cta-subtitle fade-in" id="ctaSubtitle" style="transition-delay:.1s;"></p>
      <div class="cta-buttons fade-in" style="transition-delay:.2s;">
        <a id="ctaWaBtn" href="#" target="_blank" rel="noopener" class="btn btn-whatsapp">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.004 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.977-1.305A9.96 9.96 0 0 0 12.004 22C17.53 22 22 17.523 22 12S17.53 2 12.004 2zm0 18c-1.7 0-3.3-.453-4.676-1.238l-.336-.2-3.458.906.924-3.368-.22-.348A7.968 7.968 0 0 1 4 12c0-4.418 3.584-8 8.004-8C16.42 4 20 7.582 20 12s-3.582 8-7.996 8z"/></svg>
          <span id="ctaWaText"></span>
        </a>
      </div>
      <div class="cta-form fade-in" style="transition-delay:.3s;">
        <div class="form-title" id="ctaFormTitle"></div>
        <form onsubmit="handleSubmit(event)">
          <div class="form-group"><label>שם מלא</label><input type="text" name="name" placeholder="ישראל ישראלי" required /></div>
          <div class="form-group"><label>טלפון</label><input type="tel" name="phone" placeholder="05X-XXXXXXX" required /></div>
          <div class="form-group"><label>ספר/י בקצרה על הסיטואציה</label><textarea name="message" placeholder="לדוגמה: קיבלתי דחייה מהבנק..."></textarea></div>
          <button type="submit" class="btn btn-gold form-submit">שלחי פנייה ←</button>
        </form>
        <p class="form-promise" id="ctaPromise"></p>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="container">
    <p id="footerText"></p>
  </div>
</footer>

<!-- FLOATING WA -->
<a class="whatsapp-float" id="waFloat" href="#" target="_blank" rel="noopener" aria-label="שלח וואטסאפ">
  <div class="whatsapp-pulse"></div>
  <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.004 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.977-1.305A9.96 9.96 0 0 0 12.004 22C17.53 22 22 17.523 22 12S17.53 2 12.004 2zm0 18c-1.7 0-3.3-.453-4.676-1.238l-.336-.2-3.458.906.924-3.368-.22-.348A7.968 7.968 0 0 1 4 12c0-4.418 3.584-8 8.004-8C16.42 4 20 7.582 20 12s-3.582 8-7.996 8z"/></svg>
</a>

<script>
async function init() {
  const res = await fetch('/api/content');
  const C = await res.json();
  render(C);
  document.body.classList.remove('loading');
  document.body.classList.add('ready');
  setupObserver();
  setupHamburger();
}

function t(s) { return String(s || ''); }

function render(C) {
  /* NAV */
  document.getElementById('navLogo').innerHTML = `${t(C.nav.logoText)} <span>${t(C.nav.logoAccent)}</span>`;
  document.getElementById('navCta').textContent = t(C.nav.ctaText);
  const links = (C.nav.links || []).map((l,i) => {
    const anchors = ['#pain-solution','#process','#specialties','#about','#testimonials'];
    return `<li><a href="${anchors[i]||'#'}">${t(l)}</a></li>`;
  }).join('');
  document.getElementById('navLinks').innerHTML = links;
  document.getElementById('mobileMenu').innerHTML = (C.nav.links || []).map((l,i) => {
    const anchors = ['#pain-solution','#process','#specialties','#about','#testimonials'];
    return `<a href="${anchors[i]||'#'}" class="mobile-link">${t(l)}</a>`;
  }).join('') + `<a href="#cta-bottom" class="btn btn-gold">${t(C.nav.ctaText)}</a>`;

  /* HERO */
  document.getElementById('heroTag').textContent = t(C.hero.tag);
  document.getElementById('heroTitle').innerHTML = `${t(C.hero.titleLine1)}<br><em>${t(C.hero.titleItalic)}</em>`;
  document.getElementById('heroSub').textContent = t(C.hero.subtitle);
  document.getElementById('heroCta').textContent = t(C.hero.ctaText);
  const trust = (C.hero.trust || []);
  document.getElementById('heroTrust').innerHTML = trust.map((x,i) =>
    `<span>${t(x)}</span>${i < trust.length-1 ? '<span class="dot">·</span>' : ''}`
  ).join('');
  const chipPos = ['chip-1','chip-2','chip-3'];
  const chipDelays = ['.4s','.5s','.6s'];
  document.getElementById('heroChips').innerHTML = (C.hero.stats || []).map((s,i) =>
    `<div class="data-chip ${chipPos[i]||''} fade-in" style="transition-delay:${chipDelays[i]||'.4s'};">
      <span class="chip-num">${t(s.num)}</span><span>${t(s.label)}</span>
    </div>`
  ).join('');

  /* PAIN/SOLUTION */
  document.getElementById('psLabel').textContent = t(C.painSolution.sectionLabel);
  document.getElementById('psTitle').textContent = t(C.painSolution.title);
  document.getElementById('painsList').innerHTML = (C.painSolution.pains || []).map((p,i) =>
    `<div class="pain-item fade-in" style="transition-delay:${i*.1}s;">
      <div class="pain-marker"></div>
      <div><h4>${t(p.title)}</h4><p>${t(p.text)}</p></div>
    </div>`
  ).join('');
  document.getElementById('solutionsList').innerHTML = (C.painSolution.solutions || []).map((s,i) =>
    `<div class="solution-item fade-in" style="transition-delay:${i*.1+.05}s;">
      <div class="solution-marker"></div>
      <div><h4>${t(s.title)}</h4><p>${t(s.text)}</p></div>
    </div>`
  ).join('');

  /* PROCESS */
  document.getElementById('procLabel').textContent = t(C.process.sectionLabel);
  document.getElementById('procTitle').textContent = t(C.process.title);
  document.getElementById('timeline').innerHTML = (C.process.steps || []).map((s,i) =>
    `<div class="timeline-step fade-in" style="transition-delay:${i*.1}s;">
      <div class="step-num">${t(s.num)}</div>
      <div><div class="step-title">${t(s.title)}</div><div class="step-desc">${t(s.desc)}</div></div>
    </div>`
  ).join('');

  /* SPECIALTIES */
  const specIcons = ['🛡️','🏠','💰','📈'];
  document.getElementById('specLabel').textContent = t(C.specialties.sectionLabel);
  document.getElementById('specTitle').textContent = t(C.specialties.title);
  document.getElementById('specCards').innerHTML = (C.specialties.cards || []).map((c,i) =>
    `<div class="spec-card fade-in" style="transition-delay:${i*.1}s;">
      <div class="spec-icon">${specIcons[i]||'⭐'}</div>
      <h3>${t(c.title)}</h3><p>${t(c.text)}</p>
    </div>`
  ).join('');

  /* ABOUT */
  document.getElementById('aboutLabel').textContent = t(C.about.sectionLabel);
  document.getElementById('aboutTitle').textContent = t(C.about.title);
  document.getElementById('aboutName').textContent  = t(C.about.name);
  document.getElementById('aboutSubtitle').textContent = t(C.about.subtitle);
  document.getElementById('aboutText').textContent  = t(C.about.text);
  const avatar = document.getElementById('avatarCircle');
  if (C.about.photo) {
    avatar.innerHTML = `<img src="${t(C.about.photo)}" alt="${t(C.about.name)}" />`;
  } else {
    avatar.textContent = t(C.about.initials);
  }
  document.getElementById('credList').innerHTML = (C.about.credentials || []).map(c =>
    `<li><div class="cred-check">✓</div><span>${t(c)}</span></li>`
  ).join('');

  /* TESTIMONIALS */
  document.getElementById('testiLabel').textContent = t(C.testimonials.sectionLabel);
  document.getElementById('testiTitle').textContent = t(C.testimonials.title);
  document.getElementById('testiGrid').innerHTML = (C.testimonials.items || []).map((item,i) =>
    `<div class="testi-card fade-in" style="transition-delay:${i*.1}s;">
      <div class="quote-mark">"</div>
      <p class="testi-text">${t(item.text)}</p>
      <div class="testi-meta">
        <div class="testi-name">${t(item.name)}</div>
        <div class="testi-case">${t(item.case)}</div>
      </div>
    </div>`
  ).join('');

  /* CTA */
  const waUrl = `https://wa.me/${t(C.cta.whatsappNumber)}`;
  document.getElementById('ctaLabel').textContent    = t(C.cta.sectionLabel);
  document.getElementById('ctaTitle').innerHTML      = `${t(C.cta.title)} <em>${t(C.cta.titleItalic)}</em>`;
  document.getElementById('ctaSubtitle').textContent = t(C.cta.subtitle);
  document.getElementById('ctaWaBtn').href           = waUrl;
  document.getElementById('ctaWaText').textContent   = t(C.cta.whatsappText);
  document.getElementById('ctaFormTitle').textContent = t(C.cta.formTitle);
  document.getElementById('ctaPromise').textContent  = t(C.cta.promise);
  document.getElementById('waFloat').href            = waUrl;

  /* FOOTER */
  document.getElementById('footerText').innerHTML = t(C.footer.text).replace('לירון מזרחי','<span>לירון מזרחי</span>');
}

function setupObserver() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.12 });
  document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
}

function setupHamburger() {
  const btn  = document.getElementById('hamburger');
  const menu = document.getElementById('mobileMenu');
  btn.addEventListener('click', () => { btn.classList.toggle('open'); menu.classList.toggle('open'); });
  menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
    btn.classList.remove('open'); menu.classList.remove('open');
  }));
}

async function handleSubmit(e) {
  e.preventDefault();
  const b    = e.target.querySelector('.form-submit');
  const data = Object.fromEntries(new FormData(e.target));
  b.disabled = true;
  b.textContent = '⏳ שולח...';
  try {
    await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch {}
  b.textContent = '✓ הפנייה נשלחה!';
  b.style.background = 'var(--forest-trust)';
  b.style.color = '#fff';
}

init();
</script>
</body>
</html>
